<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Petigru Letters{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f5f0;
      font-family: Georgia, 'Times New Roman', serif;
    }
    .navbar {
      background-color: #2c2c2c !important;
    }
    .navbar-brand {
      font-family: Georgia, serif;
      font-size: 1.3rem;
      letter-spacing: 0.03em;
    }
    .card {
      border-radius: 6px;
      border: 1px solid #d8cfc4;
      background-color: #fffdf9;
    }
    .card:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      transform: translateY(-2px);
      transition: all 0.25s ease;
    }
    .badge-year {
      background-color: #6b4f2a;
      color: #fff;
      font-size: 0.75rem;
    }
    .letter-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.97rem;
      line-height: 1.75;
      white-space: pre-wrap;
    }
    .search-highlight {
      background-color: #ffe082;
      border-radius: 2px;
      padding: 0 2px;
    }
    h1, h2, h3, h4 {
      font-family: Georgia, serif;
    }
    .section-header {
      border-bottom: 2px solid #6b4f2a;
      padding-bottom: 0.4rem;
      margin-bottom: 1.5rem;
      color: #3a2a18;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('index') }}">Petigru Letters</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('index') }}">All Letters</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('recipients') }}">By Recipient</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('by_year') }}">By Year</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
